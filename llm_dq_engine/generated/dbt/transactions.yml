version: 2
models:
- name: transactions
  columns:
  - name: transaction_id
    data_tests:
    - not_null
    - unique
  - name: account_id
    data_tests:
    - not_null
  - name: transaction_date
    data_tests:
    - not_null
  - name: amount
    data_tests:
    - not_null
  - name: payment_status
    data_tests:
    - accepted_values:
        arguments:
          values:
          - success
          - failed
          - pending
